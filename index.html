<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT Consulting at Knowledge 26</title>
    <meta name="description"
        content="BOT Consulting is at Knowledge 2026, May 5–7 in Las Vegas, hosting an exclusive brunch with select ServiceNow leaders to talk about how we are accelerating innovation and delivering excellence for Servicenow partners like, Stridepath and Bettera.">
    <meta property="og:title" content="BOT Consulting at Knowledge 26">
    <meta property="og:description"
        content="BOT Consulting is at Knowledge 2026, May 5–7 in Las Vegas, hosting an exclusive brunch with select ServiceNow leaders to talk about how we are accelerating innovation and delivering excellence for Servicenow partners like, Stridepath and Bettera.">
    <meta property="og:image" content="./images/vegas.jpg">
    <link
        href="https://cdn.prod.website-files.com/6746e7ae951ad1708ddc7e9c/6746e956703448a74db32f0d_Webflow%20-%20Fevicon_32.png"
        rel="shortcut icon" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script async src="https://www.influ2.com/tracker?clid=f9a44c38-1cef-45ba-88eb-e702ea04d6c4"></script>
    <script src="https://js-na2.hsforms.net/forms/embed/48825129.js" defer></script>
    <style>
        :root {
            --dark: #15171f;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--dark);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
        }

        img {
            object-fit: cover;
            object-position: center top;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            z-index: 999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        #root {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TEAL = "#215052";
        const TEAL_DARK = "#183944";
        const CYAN = "#42C3D6";
        const ORANGE = "#F16522";
        const DARK = "#15171F";
        const OFF = "#FAFAFA";
        const FONT = "'Plus Jakarta Sans', sans-serif";

        function useInView(threshold = 0.12) {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const el = ref.current;
                if (!el) return undefined;

                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) setVisible(true);
                }, { threshold });

                observer.observe(el);
                return () => observer.disconnect();
            }, [threshold]);

            return [ref, visible];
        }

        function FadeIn({ children, delay = 0 }) {
            const [ref, visible] = useInView();
            return (
                <div
                    ref={ref}
                    style={{
                        opacity: visible ? 1 : 0,
                        transform: visible ? "translateY(0)" : "translateY(24px)",
                        transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
                    }}
                >
                    {children}
                </div>
            );
        }

        function Avatar({ src, alt, initials, size = 56, flip = false, objectPosition = "center top" }) {
            const [errored, setErrored] = useState(false);

            return (
                <div
                    style={{
                        width: `${size}px`,
                        height: `${size}px`,
                        borderRadius: "50%",
                        flexShrink: 0,
                        background: `linear-gradient(135deg, ${TEAL} 0%, ${CYAN} 100%)`,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        color: "white",
                        fontFamily: FONT,
                        fontSize: size > 70 ? "28px" : "16px",
                        fontWeight: 700,
                        overflow: "hidden",
                    }}
                >
                    {!errored && src ? (
                        <img
                            src={src}
                            alt={alt}
                            style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: objectPosition, transform: flip ? "scaleX(-1)" : "none" }}
                            onError={() => setErrored(true)}
                        />
                    ) : (
                        initials
                    )}
                </div>
            );
        }

        const NAV_ITEMS = [
            { label: "Brunch", href: "#brunch" },
            { label: "About", href: "#about" },
            { label: "Capabilities", href: "#capabilities" },
            { label: "Proof", href: "#proof" },
            { label: "RSVP", href: "#rsvp" },
        ];

        function Nav() {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 48);
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            return (
                <nav
                    style={{
                        position: "fixed",
                        top: 0,
                        left: 0,
                        right: 0,
                        zIndex: 100,
                        background: scrolled || menuOpen ? "rgba(21,23,31,0.98)" : "transparent",
                        backdropFilter: scrolled || menuOpen ? "blur(14px)" : "none",
                        transition: "all 0.3s ease",
                        padding: "0 24px",
                        borderBottom: scrolled || menuOpen ? "1px solid rgba(255,255,255,0.06)" : "none",
                    }}
                >
                    <div
                        style={{
                            maxWidth: "1200px",
                            margin: "0 auto",
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "space-between",
                            minHeight: "64px",
                            padding: "8px 0",
                            position: "relative"
                        }}
                    >
                        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                            <img src="./images/BOT logo white.svg" alt="BOT Consulting" style={{ height: "32px", width: "auto", display: "block" }} />
                            <span className="mobile-hidden" style={{ width: "1px", height: "14px", background: "rgba(255,255,255,0.18)" }} />
                            <a className="mobile-hidden" href="https://www.servicenow.com/events/knowledge.html" target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center" }}>
                                <img src="./images/knowledge26-logo.svg" alt="Knowledge 26" style={{ height: "42px", width: "auto", display: "block" }} />
                            </a>
                        </div>
                        {/* Desktop Nav */}
                        <div className="mobile-hidden" style={{ display: "flex", gap: "22px", flexWrap: "wrap", alignItems: "center" }}>
                            {NAV_ITEMS.map((item) => (
                                <a
                                    key={item.href}
                                    href={item.href}
                                    style={{ position: "relative", color: "rgba(255,255,255,0.68)", fontSize: "13px", fontWeight: 600, textDecoration: "none", fontFamily: FONT, transition: "color 0.2s ease" }}
                                    onMouseEnter={(e) => (e.target.style.color = "white")}
                                    onMouseLeave={(e) => (e.target.style.color = "rgba(255,255,255,0.68)")}
                                >
                                    {item.label}
                                </a>
                            ))}
                        </div>
                        {/* Mobile Hamburger Icon */}
                        <div className="desktop-hidden-flex" style={{ alignItems: "center", cursor: "pointer", padding: "4px" }} onClick={() => setMenuOpen(!menuOpen)}>
                            <div style={{ width: "24px", height: "18px", display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
                                <span style={{ width: "100%", height: "2px", background: "white", transition: "0.3s", transform: menuOpen ? "rotate(45deg) translate(5px, 6px)" : "none" }}></span>
                                <span style={{ width: "100%", height: "2px", background: "white", transition: "0.3s", opacity: menuOpen ? 0 : 1 }}></span>
                                <span style={{ width: "100%", height: "2px", background: "white", transition: "0.3s", transform: menuOpen ? "rotate(-45deg) translate(5px, -6px)" : "none" }}></span>
                            </div>
                        </div>
                    </div>
                    {/* Mobile Menu Dropdown */}
                    {menuOpen && (
                        <div className="nav-menu-mob desktop-hidden-flex">
                            {NAV_ITEMS.map((item) => (
                                <a
                                    key={item.href}
                                    href={item.href}
                                    onClick={() => setMenuOpen(false)}
                                    style={{ color: "rgba(255,255,255,0.85)", fontSize: "16px", fontWeight: 600, textDecoration: "none", fontFamily: FONT, padding: "8px 0" }}
                                >
                                    {item.label}
                                </a>
                            ))}
                        </div>
                    )}
                </nav>
            );
        }

        function Hero() {
            const [isMeetingOpen, setIsMeetingOpen] = useState(false);

            useEffect(() => {
                if (isMeetingOpen) {
                    const script = document.createElement("script");
                    script.src = "https://static.hsappstatic.net/MeetingsEmbed/ex/MeetingsEmbedCode.js";
                    script.type = "text/javascript";
                    script.async = true;
                    document.body.appendChild(script);

                    return () => {
                        if (document.body.contains(script)) {
                            document.body.removeChild(script);
                        }
                    };
                }
            }, [isMeetingOpen]);

            return (
                <section
                    style={{
                        background: `linear-gradient(160deg, ${DARK} 0%, ${TEAL_DARK} 52%, ${TEAL} 100%)`,
                        minHeight: "100vh",
                        display: "flex",
                        alignItems: "center",
                        position: "relative",
                        overflow: "hidden",
                    }}
                >
                    <div
                        style={{
                            position: "absolute",
                            inset: 0,
                            opacity: 0.05,
                            backgroundImage: `radial-gradient(circle at 2px 2px, ${CYAN} 0.8px, transparent 0.8px)`,
                            backgroundSize: "44px 44px",
                        }}
                    />
                    <div
                        style={{
                            position: "absolute",
                            top: "8%",
                            right: "-8%",
                            width: "540px",
                            height: "540px",
                            borderRadius: "50%",
                            background: `radial-gradient(circle, rgba(241,101,34,0.16) 0%, transparent 62%)`,
                        }}
                    />

                    <div className="hero-pad-mob" style={{ maxWidth: "1200px", margin: "0 auto", padding: "136px 24px 80px", position: "relative", zIndex: 1, width: "100%" }}>
                        <div style={{ display: "flex", gap: "48px", alignItems: "flex-start", flexWrap: "wrap" }}>
                            {/* Left Content */}
                            <div style={{ flex: "1 1 500px" }}>
                                <FadeIn>
                                    <div
                                        style={{
                                            display: "inline-flex",
                                            alignItems: "center",
                                            gap: "8px",
                                            background: "rgba(255,255,255,0.06)",
                                            borderRadius: "20px",
                                            padding: "6px 16px",
                                            marginBottom: "28px",
                                            border: "1px solid rgba(255,255,255,0.08)",
                                        }}
                                    >
                                        <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: ORANGE, display: "inline-block" }} />
                                        <span style={{ color: "rgba(255,255,255,0.78)", fontSize: "13px", fontWeight: 600, fontFamily: FONT }}>
                                            5 - 7th May 2026
                                        </span>
                                    </div>

                                    <h1
                                        className="hero-heading-mob"
                                        style={{
                                            fontFamily: FONT,
                                            fontSize: "clamp(44px, 6vw, 76px)",
                                            fontWeight: 800,
                                            color: "white",
                                            lineHeight: 1.03,
                                            letterSpacing: "-2px",
                                            margin: "0 0 22px",
                                        }}
                                    >
                                        BOT at
                                        <br />
                                        <span style={{ color: CYAN }}>Knowledge</span> <span style={{ color: ORANGE }}>26</span>
                                    </h1>

                                    <p style={{ fontFamily: FONT, fontSize: "18px", color: "rgba(255,255,255,0.66)", lineHeight: 1.7, maxWidth: "600px", margin: "0 0 34px" }}>
                                        We're a trusted partner of choice for building high performing AI native delivery teams in India - Come say hello and grab brunch with us!
                                    </p>

                                    <div className="stack-mob" style={{ display: "flex", gap: "16px", flexWrap: "wrap", marginBottom: "52px" }}>
                                        <a href="#rsvp" className="custom-btn text-center-mob" style={{ background: ORANGE, color: "white", padding: "14px 28px", borderRadius: "8px", fontSize: "15px", fontWeight: 700, textDecoration: "none", fontFamily: FONT }}>
                                            RSVP for Brunch →
                                        </a>
                                        <button onClick={() => setIsMeetingOpen(true)} className="custom-btn-outline text-center-mob" style={{ background: "rgba(255,255,255,0.06)", color: "white", padding: "14px 28px", borderRadius: "8px", fontSize: "15px", fontWeight: 600, textDecoration: "none", fontFamily: FONT, border: "1px solid rgba(255,255,255,0.12)", cursor: "pointer" }}>
                                            Book a meeting
                                        </button>
                                    </div>
                                </FadeIn>

                                <FadeIn delay={0.15}>
                                    <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: "26px" }}>
                                        <span style={{ fontFamily: FONT, fontSize: "11px", fontWeight: 700, color: "rgba(255,255,255,0.38)", letterSpacing: "2px", display: "block", marginBottom: "16px" }}>
                                            TRUSTED BY
                                        </span>
                                        <div style={{ display: "flex", alignItems: "center", gap: "16px", flexWrap: "wrap" }}>
                                            {[
                                                { name: "Stridepath", logo: "./images/stridepath.png", url: "https://stridepath.com/" },
                                                { name: "Bettera", logo: "./images/BETTERA.png", url: "https://www.bettera.co/" }
                                            ].map((item) => (
                                                <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer" style={{ display: "flex", justifyContent: "center", alignItems: "center" }}>
                                                    <img src={item.logo} alt={item.name} style={{ height: "56px", borderRadius: "8px", objectFit: "contain", objectPosition: "center center" }} />
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                </FadeIn>
                            </div>

                            {/* Right Image Content */}
                            <div className="hero-img-mob" style={{ flex: "1 1 400px", display: "flex", justifyContent: "center", marginTop: "56px" }}>
                                <FadeIn delay={0.25}>
                                    <div style={{ position: "relative", width: "100%", maxWidth: "560px", aspectRatio: "16/10", borderRadius: "20px", overflow: "hidden", boxShadow: "0 24px 48px rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.12)" }}>
                                        <img src="./images/vegas.jpg" alt="Las Vegas" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                                    </div>
                                </FadeIn>
                            </div>
                        </div>
                    </div>

                    {isMeetingOpen && (
                        <div style={{
                            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                            zIndex: 99999, background: "rgba(21, 23, 31, 0.8)",
                            backdropFilter: "blur(8px)", display: "flex",
                            alignItems: "center", justifyContent: "center", padding: "20px"
                        }}>
                            <div style={{
                                background: "white", borderRadius: "16px",
                                width: "100%", maxWidth: "600px", maxHeight: "90vh",
                                position: "relative", overflow: "hidden",
                                display: "flex", flexDirection: "column",
                                boxShadow: "0 24px 48px rgba(0,0,0,0.4)"
                            }}>
                                <button
                                    onClick={() => setIsMeetingOpen(false)}
                                    style={{
                                        position: "absolute", top: "16px", right: "16px",
                                        background: "rgba(0,0,0,0.05)", border: "none",
                                        width: "32px", height: "32px", borderRadius: "50%",
                                        display: "flex", alignItems: "center", justifyContent: "center",
                                        fontSize: "18px", cursor: "pointer", zIndex: 10,
                                        color: "#333", transition: "background 0.2s"
                                    }}
                                    onMouseEnter={(e) => e.currentTarget.style.background = "rgba(0,0,0,0.1)"}
                                    onMouseLeave={(e) => e.currentTarget.style.background = "rgba(0,0,0,0.05)"}
                                >
                                    ✕
                                </button>
                                <div style={{ overflowY: "auto", flex: 1, padding: "24px 12px 12px" }}>
                                    <div className="meetings-iframe-container" data-src="https://meetings-na2.hubspot.com/manpreet21?embed=true"></div>
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        }

        function Brunch() {
            return (
                <section id="brunch" className="pad-mob" style={{
                    background: `linear-gradient(135deg, #F47530 0%, #E5490A 100%)`,
                    padding: "100px 24px", position: "relative", overflow: "hidden",
                }}>
                    <div style={{ position: "absolute", inset: 0, opacity: 0.06, backgroundImage: "radial-gradient(circle at 2px 2px, white 0.5px, transparent 0.5px)", backgroundSize: "32px 32px" }} />

                    <div style={{ maxWidth: "1200px", margin: "0 auto", position: "relative", zIndex: 1 }}>

                        {/* Section header — matches existing pattern */}
                        <FadeIn>
                            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px" }}>
                                <div style={{ width: "40px", height: "2px", background: "white" }} />
                                <span style={{ color: "white", fontSize: "12px", fontWeight: 700, letterSpacing: "2px", fontFamily: FONT }}>
                                    EXCLUSIVE BRUNCH
                                </span>
                            </div>

                            <h2 style={{
                                fontFamily: FONT, fontSize: "clamp(32px, 4.5vw, 52px)", fontWeight: 800,
                                color: "white", lineHeight: 1.08, letterSpacing: "-1.5px", marginBottom: "20px",
                                maxWidth: "780px",
                            }}>
                                Brunch <span style={{ color: "white" }}>with BOT </span> at Bouchon.
                            </h2>

                            <p style={{
                                fontFamily: FONT, fontSize: "17px", color: "rgba(255,255,255,0.85)", lineHeight: 1.7,
                                maxWidth: "640px", marginBottom: "48px",
                            }}>
                                An exclusive gathering of ServiceNow delivery leaders navigating the same inflection point:
                                how to scale capacity, build AI-native assets, and stay ahead of margin pressure in a
                                market that's moving fast.
                            </p>
                        </FadeIn>

                        {/* Main info grid */}
                        <FadeIn delay={0.1}>
                            <div style={{
                                display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(min(100%, 240px), 1fr))",
                                gap: "12px", marginBottom: "14px",
                            }}>
                                {[
                                    { icon: "📅", label: "When", primary: "Tuesday, May 5", secondary: "12:00 – 2:00 PM" },
                                    { icon: "📍", label: "Where", primary: "Bouchon", secondary: "The Venetian · Las Vegas", link: "https://share.google/NkYlEoMmvJpACjaJo" },
                                    //{ icon: "👥", label: "Format", primary: "One long table", secondary: "12 seats · no slides" },
                                    { icon: "🤝", label: "Hosted by", primary: "Manpreet Singh", secondary: "CEO, BOT Consulting" },
                                ].map((item, i) => (
                                    <div key={i} style={{
                                        background: "rgba(255,255,255,0.12)",
                                        border: "1px solid rgba(255,255,255,0.2)",
                                        borderRadius: "12px", padding: "20px 22px",
                                        backdropFilter: "blur(8px)",
                                    }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
                                            <span style={{ fontSize: "16px" }}>{item.icon}</span>
                                            <span style={{
                                                fontFamily: FONT, fontSize: "11px", fontWeight: 700,
                                                color: "white", letterSpacing: "1.5px", opacity: 0.8
                                            }}>{item.label.toUpperCase()}</span>
                                        </div>
                                        <div style={{ fontFamily: FONT, fontSize: "15px", fontWeight: 700, color: "white", marginBottom: "3px" }}>
                                            {item.link ? (
                                                <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ color: "white", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: "4px" }} onMouseEnter={(e) => e.currentTarget.style.textDecoration = 'underline'} onMouseLeave={(e) => e.currentTarget.style.textDecoration = 'none'}>
                                                    {item.primary}
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.8 }}><path d="M7 17l9.2-9.2M17 17V7H7" /></svg>
                                                </a>
                                            ) : (
                                                item.primary
                                            )}
                                        </div>
                                        <div style={{ fontFamily: FONT, fontSize: "13px", color: "rgba(255,255,255,0.8)" }}>
                                            {item.secondary}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </FadeIn>

                        {/* The conversation block */}
                        <FadeIn delay={0.2}>
                            <div style={{
                                background: "rgba(255,255,255,0.1)",
                                border: "1px solid rgba(255,255,255,0.2)",
                                borderRadius: "12px", padding: "36px 40px", marginBottom: "14px",
                                borderLeft: `4px solid white`,
                            }}>
                                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "14px" }}>
                                    <span style={{
                                        fontFamily: FONT, fontSize: "11px", fontWeight: 700,
                                        color: "white", letterSpacing: "2px", opacity: 0.8
                                    }}>THE CONVERSATION</span>
                                </div>
                                <p style={{
                                    fontFamily: FONT, fontSize: "16px", lineHeight: 1.75,
                                    color: "white", marginBottom: "16px",
                                }}>
                                    With partners like <span style={{ color: "white", fontWeight: 700 }}>StridePath</span> and <span style={{ color: "white", fontWeight: 700 }}>Bettera</span> already
                                    building delivery pods from India, we'll share what's working — from 5-person incubation teams
                                    to Now Assist and Moveworks-powered workflows — and map out how to make the most of Knowledge together.
                                </p>
                                <p style={{
                                    fontFamily: FONT, fontSize: "15px", lineHeight: 1.7,
                                    color: "rgba(255,255,255,0.8)", fontStyle: "italic", margin: 0,
                                }}>
                                    Just unfiltered conversations paired with good food and people who've been there and done it.
                                </p>
                            </div>
                        </FadeIn>

                        {/* CTA — matches existing hero button style */}
                        <FadeIn delay={0.4}>
                            <div style={{ display: "flex", gap: "16px", flexWrap: "wrap", alignItems: "center", marginBottom: "48px" }}>
                                <a href="#rsvp" className="custom-hover-scale" style={{
                                    background: "white", color: ORANGE,
                                    padding: "14px 28px", borderRadius: "8px",
                                    fontSize: "15px", fontWeight: 700, textDecoration: "none",
                                    fontFamily: FONT, display: "inline-flex", alignItems: "center", gap: "8px",
                                }}>
                                    RSVP for brunch →
                                </a>
                            </div>
                        </FadeIn>

                        {/* At the table — attendee list */}
                        <FadeIn delay={0.3}>
                            <div style={{ marginBottom: "32px" }}>

        function ScrollToTop() {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setVisible(window.scrollY > 300);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });
            };

            return (
                <button
                    onClick={scrollToTop}
                    title="Back to top"
                    className="scroll-to-top-mob"
                    style={{
                        position: "fixed",
                        bottom: "32px",
                        right: "32px",
                        width: "48px",
                        height: "48px",
                        borderRadius: "50%",
                        background: "rgba(255,255,255,0.08)",
                        backdropFilter: "blur(12px)",
                        border: "1px solid rgba(255,255,255,0.15)",
                        color: "white",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        cursor: "pointer",
                        opacity: visible ? 1 : 0,
                        visibility: visible ? "visible" : "hidden",
                        transform: visible ? "translateY(0)" : "translateY(16px)",
                        transition: "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)",
                        zIndex: 99,
                        boxShadow: "0 8px 24px rgba(0,0,0,0.2)"
                    }}
                    onMouseEnter={(e) => {
                        e.currentTarget.style.background = ORANGE;
                        e.currentTarget.style.borderColor = ORANGE;
                        e.currentTarget.style.transform = "translateY(-4px)";
                        e.currentTarget.style.boxShadow = "0 12px 28px rgba(241,101,34,0.3)";
                    }}
                    onMouseLeave={(e) => {
                        e.currentTarget.style.background = "rgba(255,255,255,0.08)";
                        e.currentTarget.style.borderColor = "rgba(255,255,255,0.15)";
                        e.currentTarget.style.transform = "translateY(0)";
                        e.currentTarget.style.boxShadow = "0 8px 24px rgba(0,0,0,0.2)";
                    }}
                >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M18 15l-6-6-6 6" />
                    </svg>
                </button>
            );
        }
